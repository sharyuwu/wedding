<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮邀請 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100%; width: 100%;
            font-family: var(--handwriting);
            color: var(--text-color);
            
            /* --- CSS 多重背景設定 --- */
            /* 關鍵說明：先寫的在最上層，後寫的在最下層 */
            background-image: 
                url('background_flower.png'), /* 上層：花卉圖案 (請確保此檔去背透明) */
                url('schedule/background.png');    /* 下層：固定不動的底圖 */
                
            /* 對應設定 */
            background-repeat: 
                no-repeat, /* 花卉：只顯示一次，滑動就會走 */
                no-repeat; /* 底圖 */
                
            background-position: 
                center top, /* 花卉：靠上置中，出現在 Hero 區塊 */
                center center; /* 底圖 */
                
            background-size: 
                auto 600px, /* 花卉：控制大小，例如高度 600px 配合 Hero Section，寬度自動 */
                cover; /* 底圖 */
                
            background-attachment: 
                scroll, /* 花卉：隨頁面捲動 */
                fixed;  /* 底圖：固定不動 */
                
            background-color: #ece5df;
        }

        /* --- 3D 翻轉容器：全版透明 --- */
        .page-wrapper {
            perspective: 2000px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .card-inner {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-style: preserve-3d;
            position: relative;
            transform: rotateY(180deg); 
            background: transparent;
            box-shadow: none;
        }
        
        .loaded .card-inner { transform: rotateY(0deg); }

        .card-face {
            width: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
        }

        /* --- Section 通用設定 --- */
        section {
            width: 100%;
            max-width: 1200px;
            padding: 80px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 為文字加上微弱陰影以確保在背景圖上的易讀性 */
        .hero-title, .hero-quote, .group-title, .event-name {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 2px rgba(255,255,255,1);
        }

        /* --- Hero Section (花卉會疊加在這個區塊的背景) --- */
        .hero-title { font-size: 2.8rem; letter-spacing: 8px; margin-bottom: 15px; font-weight: 500; }
        .hero-date { font-size: 2rem; color: var(--accent-gold); margin-bottom: 40px; font-family: initial; }
        .hero-quote { font-size: 1.2rem; margin: 20px 0; opacity: 0.9; line-height: 2; text-align: center; }

        .merged-photo-container {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            -webkit-mask-image: radial-gradient(circle, rgba(255,255,255,1) 60%, rgba(255,255,255,0) 100%);
            mask-image: radial-gradient(circle, rgba(255,255,255,1) 60%, rgba(255,255,255,0) 100%);
        }

        .merged-photo-img { width: 100%; height: auto; display: block; }

        .rsvp-button {
            margin-top: 40px;
            padding: 15px 80px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--accent-gold);
            color: var(--text-color);
            font-family: var(--handwriting);
            font-size: 1.4rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .rsvp-button:hover { background: var(--accent-gold); color: white; transform: scale(1.05); }

        /* --- Schedule Section (滑動後花卉消失，只留底圖) --- */
        .schedule-section {
            max-width: 100%;
        }

        .schedule-content-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            width: 100%;
            margin-top: 50px;
        }

        .schedule-column { display: flex; flex-direction: column; gap: 60px; }

        .divider {
            background: linear-gradient(to bottom, transparent, var(--light-gold), transparent);
            width: 1px;
            justify-self: center;
            position: relative;
        }
        .divider::after {
            content: '⚭';
            position: absolute;
            top: 5%; left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            color: var(--accent-gold);
            text-shadow: 0 0 15px white, 0 0 5px white;
        }

        .event-group { text-align: center; }
        .group-title { font-size: 2rem; font-weight: 600; margin-bottom: 10px; color: #4a3a35; }
        .group-loc { font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 40px; letter-spacing: 2px; }

        .event-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-text-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .event-time { font-weight: 600; font-size: 1.5rem; color: #4a3a35; font-family: initial; }
        .event-name { font-size: 1.3rem; margin: 5px 0 10px 0; letter-spacing: 2px; }

        .gold-line-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            position: relative;
        }
        .gold-line-divider::after {
            content: '✶';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: var(--accent-gold);
            text-shadow: 0 0 10px white;
        }

        .event-icon-container { flex: 1; display: flex; justify-content: center; }
        .event-icon-img { 
            width: 110px; 
            height: 110px; 
            object-fit: contain; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
        }

        /* --- 手機版微調 --- */
        @media (max-width: 768px) {
            section { padding: 60px 15px; min-height: auto; }
            body { background-size: auto 400px, cover; } /* 手機版花卉縮小 */
            .hero-title { font-size: 1.8rem; }
            .event-icon-img { width: 70px; height: 70px; }
            .gold-line-divider { width: 80px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="card-inner" id="mainCard">
            <div class="card-face">
                
                <section class="hero-section">
                    <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                    <p class="hero-date">10.10.2026</p>
                    
                    <p class="hero-quote">我們...沒有拍婚紗，雖然結婚是個紀念</p>
                    
                    <div class="merged-photo-container">
                        <img src="schedule/main.png" alt="婚禮照片" class="merged-photo-img">
                    </div>

                    <p class="hero-quote">在一起的每一天，更值得留念</p>

                    <button class="rsvp-button" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdX0pTRn6Xgd2ync0EHPiqUqXZl9hgQm8tBAS4sDOxQ8FcLFA/viewform?usp=header')">回覆出席</button>
                </section>

                <section class="schedule-section">
                    <div class="schedule-content-wrapper">
                        <div class="schedule-grid">
                            
                            <div class="schedule-column">
                                <div class="event-group">
                                    <h3 class="group-title">結婚典禮</h3>
                                    <p class="group-loc">汐止天主堂</p>
                                    
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:00</p>
                                            <p class="event-name">賓客入席</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_church.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:30</p>
                                            <p class="event-name">典禮開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_doves.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                        <p class="event-time">15:00</p>
                                        <p class="event-name">茶會慶祝</p>
                                        <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                        <img src="schedule/icon_cake.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="divider"></div>

                            <div class="schedule-column">
                                <div class="event-group">
                                    <h3 class="group-title">結婚晚宴</h3>
                                    <p class="group-loc">兄弟飯店，桂花廳</p>
                                    
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:00</p>
                                            <p class="event-name">晚宴簽到</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_champagne.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:30</p>
                                            <p class="event-name">晚宴開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_bouquet.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">20:30</p>
                                            <p class="event-name">送客合影</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_the_end.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <footer style="text-align: center; padding: 60px 0; opacity: 0.5; font-size: 1rem; text-shadow: 0 0 5px white;">
                    2026.10.10 | 凱翔 & 禹萱
                </footer>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 300);
        });
    </script>
</body>
</html>
