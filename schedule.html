<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮邀請 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            /* 調整透明度，讓全版背景圖隱約透出 */
            --content-bg: rgba(253, 250, 247, 0.92);
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100%; width: 100%;
            font-family: var(--handwriting);
            color: var(--text-color);
            /* --- 全版面背景圖：固定不動 --- */
            background-image: url('schedule/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            background-color: #ece5df;
        }

        /* --- 3D 翻轉容器：全版佈局 --- */
        .page-wrapper {
            perspective: 2000px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .card-inner {
            width: 100%; /* 電腦版改為全寬 */
            max-width: 100%; /* 移除原本 600px 的限制 */
            min-height: 100vh;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-style: preserve-3d;
            position: relative;
            transform: rotateY(180deg); 
            background: var(--content-bg);
        }
        
        .loaded .card-inner { transform: rotateY(0deg); }

        .card-face {
            width: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Section 通用設定：滿版感 --- */
        section {
            width: 100%;
            max-width: 1200px; /* 內容物在中間，避免文字拉太寬難以閱讀 */
            padding: 100px 20px;
            min-height: 100vh; /* 每個區塊至少佔滿一屏 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- Hero Section --- */
        .hero-section {
            z-index: 1;
        }

        .hero-title { font-size: 2.5rem; letter-spacing: 8px; margin-bottom: 15px; font-weight: 500; }
        .hero-date { font-size: 1.8rem; color: var(--accent-gold); margin-bottom: 40px; font-family: initial; }
        .hero-quote { font-size: 1.2rem; margin: 20px 0; opacity: 0.9; line-height: 2; text-align: center; }

        .merged-photo-container {
            width: 100%;
            max-width: 800px; /* 電腦版照片稍微放大 */
            margin: 40px auto;
            -webkit-mask-image: radial-gradient(circle, rgba(255,255,255,1) 70%, rgba(255,255,255,0) 100%);
            mask-image: radial-gradient(circle, rgba(255,255,255,1) 70%, rgba(255,255,255,0) 100%);
        }

        .merged-photo-img { width: 100%; height: auto; display: block; }

        .rsvp-button {
            margin-top: 40px;
            padding: 15px 80px;
            background: white;
            border: 2px solid var(--accent-gold);
            color: var(--text-color);
            font-family: var(--handwriting);
            font-size: 1.4rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .rsvp-button:hover { background: var(--accent-gold); color: white; transform: scale(1.05); }

        /* --- Schedule Section --- */
        .schedule-section {
            background: rgba(255, 255, 255, 0.3); /* 輕微區隔感 */
            max-width: 100%; /* 讓底色能拉滿全螢幕 */
        }

        .schedule-content-wrapper {
            width: 100%;
            max-width: 1000px; /* 內容集中 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            width: 100%;
            margin-top: 50px;
        }

        .schedule-column { display: flex; flex-direction: column; gap: 60px; }

        .divider {
            background: var(--light-gold);
            width: 1px;
            justify-self: center;
            position: relative;
        }
        .divider::after {
            content: '⚭';
            position: absolute;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            background: #fdfaf7;
            padding: 15px 0;
            font-size: 2rem;
            color: var(--accent-gold);
        }

        .event-group { text-align: center; }
        .group-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; color: #4a3a35; }
        .group-loc { font-size: 1rem; color: var(--accent-gold); margin-bottom: 40px; letter-spacing: 2px; }

        .event-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-text-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .event-time { font-weight: 600; font-size: 1.4rem; color: #4a3a35; font-family: initial; }
        .event-name { font-size: 1.2rem; margin: 5px 0 10px 0; letter-spacing: 2px; }

        .gold-line-divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            position: relative;
        }
        .gold-line-divider::after {
            content: '✶';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: var(--accent-gold);
            background: #fdfaf7;
            padding: 0 5px;
        }

        .event-icon-container { flex: 1; display: flex; justify-content: center; }
        .event-icon-img { width: 100px; height: 100px; object-fit: contain; }

        /* --- 手機版微調 (Responsive) --- */
        @media (max-width: 768px) {
            section { padding: 60px 15px; min-height: auto; }
            .hero-title { font-size: 1.8rem; }
            .hero-date { font-size: 1.3rem; }
            .schedule-grid { grid-template-columns: 1fr 2px 1fr; gap: 5px; }
            .divider::after { font-size: 1.2rem; }
            .event-item { gap: 10px; }
            .event-icon-img { width: 60px; height: 60px; }
            .group-title { font-size: 1.3rem; }
            .event-time { font-size: 1.1rem; }
            .event-name { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="card-inner" id="mainCard">
            <div class="card-face">
                
                <section class="hero-section">
                    <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                    <p class="hero-date">10.10.2026</p>
                    
                    <p class="hero-quote">我們...沒有拍婚紗，雖然結婚是個紀念</p>
                    
                    <div class="merged-photo-container">
                        <img src="schedule/main.png" alt="婚禮照片" class="merged-photo-img">
                    </div>

                    <p class="hero-quote">在一起的每一天，更值得留念</p>

                    <button class="rsvp-button" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdX0pTRn6Xgd2ync0EHPiqUqXZl9hgQm8tBAS4sDOxQ8FcLFA/viewform?usp=header')">回覆出席</button>
                </section>

                <section class="schedule-section">
                    <div class="schedule-content-wrapper">
                        <div class="schedule-grid">
                            
                            <div class="schedule-column">
                                <div class="event-group">
                                    <h3 class="group-title">結婚典禮</h3>
                                    <p class="group-loc">汐止天主堂</p>
                                    
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:00</p>
                                            <p class="event-name">賓客入席</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_church.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:30</p>
                                            <p class="event-name">典禮開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_doves.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">15:00</p>
                                            <p class="event-name">茶會慶祝</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_cake.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="divider"></div>

                            <div class="schedule-column">
                                <div class="event-group">
                                    <h3 class="group-title">結婚晚宴</h3>
                                    <p class="group-loc">兄弟飯店，桂花廳</p>
                                    
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:00</p>
                                            <p class="event-name">晚宴簽到</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_champagne.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:30</p>
                                            <p class="event-name">晚宴開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_bouquet.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">20:30</p>
                                            <p class="event-name">送客合影</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_the_end.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <footer style="text-align: center; padding: 60px 0; opacity: 0.5; font-size: 0.9rem;">
                    2026.10.10 | 凱翔 & 禹萱
                </footer>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 300);
        });
    </script>
</body>
</html>
