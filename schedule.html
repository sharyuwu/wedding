<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮行程 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            overflow-x: hidden;
            font-family: var(--handwriting);
            background-color: #fdfaf7;
            color: var(--text-color);
        }

        /* --- 3D 翻轉容器 --- */
        .page-wrapper {
            perspective: 2000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-style: preserve-3d;
            position: relative;
            /* 初始狀態：在背面 (旋轉 180 度) */
            transform: rotateY(180deg); 
        }
        
        /* 載入後變回正面 (從背面翻轉過來的效果) */
        .loaded .card-inner {
            transform: rotateY(0deg);
        }

        /* 點擊返回時轉回去 */
        .is-leaving .card-inner {
            transform: rotateY(180deg);
            opacity: 0;
        }

        /* --- 內容頁面樣式 --- */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            background: #fdfaf7;
            overflow-y: auto;
        }

        h2 {
            color: var(--accent-gold);
            font-size: 2.2rem;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .schedule-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* 時間軸線條 */
        .schedule-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--accent-gold);
            opacity: 0.3;
        }

        .schedule-item {
            margin: 30px 0;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .time {
            display: inline-block;
            background: var(--accent-gold);
            color: white;
            padding: 2px 15px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .event {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .location {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        /* --- 按鈕樣式 --- */
        .back-button {
            margin-top: 50px;
            margin-bottom: 40px;
            padding: 10px 40px;
            background: none;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--handwriting);
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-button:hover {
            background: var(--accent-gold);
            color: white;
        }

        /* 手機版微調 */
        @media screen and (max-width: 768px) {
            h2 { font-size: 1.8rem; }
            .event { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="card-inner" id="scheduleCard">
            <div class="card-face">
                <h2>婚禮行程表</h2>
                
                <div class="schedule-container">
                    <div class="schedule-item">
                        <div class="time">12:00</div>
                        <div class="event">迎賓入席</div>
                        <div class="location">Reception</div>
                    </div>

                    <div class="schedule-item">
                        <div class="time">12:30</div>
                        <div class="event">新人進場 / 婚禮開場</div>
                        <div class="location">Grand Entrance</div>
                    </div>

                    <div class="schedule-item">
                        <div class="time">13:00</div>
                        <div class="event">午宴開始</div>
                        <div class="location">Wedding Banquet</div>
                    </div>

                    <div class="schedule-item">
                        <div class="time">15:30</div>
                        <div class="event">送客合影</div>
                        <div class="location">Farewell & Photo Session</div>
                    </div>
                </div>

                <button class="back-button" onclick="goBack()">← 返回邀請函</button>
                
                <p style="font-size: 0.8rem; color: #bdc3c7; margin-bottom: 40px;">2026.10.10 | 凱翔 & 禹萱</p>
            </div>
        </div>
    </div>

    <script>
        // 頁面載入後，觸發翻轉進入動畫
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 100);
        });

        // 返回首頁：執行翻轉並跳轉
        function goBack() {
            document.body.classList.add('is-leaving');
            
            // 延遲跳轉，等待 CSS 翻轉動畫完成 (0.8s)
            setTimeout(() => {
                window.location.href = "index.html";
            }, 700);
        }
    </script>
</body>
</html>
