<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮邀請 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            --bg-color: #fdfaf7;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            background-color: #ece5df; 
            font-family: var(--handwriting);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- 3D 翻轉容器 --- */
        .page-wrapper {
            perspective: 2000px;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .card-inner {
            width: 100%;
            max-width: 600px;
            min-height: 100vh;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-style: preserve-3d;
            position: relative;
            transform: rotateY(180deg); 
            background: var(--bg-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .loaded .card-inner { transform: rotateY(0deg); }

        .card-face {
            width: 100%;
            background: var(--bg-color);
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: 60px;
            position: relative;
        }

        /* 裝飾元素 */
        .card-face::before {
            content: '✿';
            position: absolute; top: -10px; left: -10px;
            font-size: 150px; color: #d4e0d2; opacity: 0.3; z-index: 0;
            pointer-events: none;
        }

        /* --- Hero Section --- */
        .hero-section {
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hero-title { font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 10px; font-weight: 500; }
        .hero-date { font-size: 1.4rem; color: var(--accent-gold); margin-bottom: 30px; font-family: initial; }
        .hero-quote { font-size: 1.05rem; margin: 15px 0; opacity: 0.9; line-height: 1.8; }

        .merged-photo-container {
            width: 100%;
            max-width: 560px;
            margin: 40px auto;
            padding: 0 15px;
            -webkit-mask-image: radial-gradient(circle, rgba(255,255,255,1) 75%, rgba(255,255,255,0) 100%);
            mask-image: radial-gradient(circle, rgba(255,255,255,1) 75%, rgba(255,255,255,0) 100%);
        }

        .merged-photo-img { width: 100%; height: auto; border-radius: 4px; display: block; }

        .rsvp-btn-container { margin-top: 40px; }
        .rsvp-button {
            padding: 12px 60px;
            background: white;
            border: 2px solid var(--accent-gold);
            color: var(--text-color);
            font-family: var(--handwriting);
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .rsvp-button:hover { background: var(--bg-color); transform: scale(1.05); }
        .rsvp-subtext { font-size: 0.85rem; color: #888; margin-top: 10px; }

        /* --- Schedule Section --- */
        .schedule-section {
            padding: 40px 20px;
            background: linear-gradient(to bottom, transparent, #fff9f0);
            position: relative;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 2px 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .schedule-column { display: flex; flex-direction: column; gap: 40px; }

        .divider {
            background: var(--light-gold);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .divider::after {
            content: '⚭';
            position: absolute;
            top: 40%;
            background: var(--bg-color);
            padding: 10px 0;
            font-size: 1.5rem;
            color: var(--accent-gold);
        }

        .event-group { text-align: center; }
        .group-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 5px; color: #4a3a35; }
        .group-loc { font-size: 0.9rem; color: var(--accent-gold); margin-bottom: 25px; }

        .event-item { margin-bottom: 30px; }
        .event-time { font-weight: 600; font-size: 1.1rem; color: #4a3a35; }
        .event-name { font-size: 1rem; margin: 4px 0; }
        
        /* --- 圖示樣式更新 --- */
        .event-icon-img {
            width: 70px; /* 調整圖示寬度，你可以視情況改為 60px 或 80px */
            height: auto;
            margin-top: 12px;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            .hero-title { font-size: 1.5rem; }
            .event-icon-img { width: 55px; }
            .schedule-grid { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="card-inner" id="mainCard">
            <div class="card-face">
                
                <section class="hero-section">
                    <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                    <p class="hero-date">10.10.2026</p>
                    
                    <p class="hero-quote">我們...沒有拍婚紗，雖然結婚是個紀念</p>
                    
                    <div class="merged-photo-container">
                        <img src="main.png" alt="凱翔與禹萱照片" class="merged-photo-img">
                    </div>

                    <p class="hero-quote">在一起的每一天，更值得留念</p>

                    <div class="rsvp-btn-container">
                        <button class="rsvp-button" onclick="window.open('YOUR_GOOGLE_FORM_URL')">回覆出席</button>
                        <p class="rsvp-subtext">填寫 Google 表單，統計參與人數</p>
                    </div>
                </section>

                <section class="schedule-section">
                    <div class="schedule-grid">
                        <div class="schedule-column">
                            <div class="event-group">
                                <h3 class="group-title">結婚典禮</h3>
                                <p class="group-loc">地點：汐止天主堂</p>
                                
                                <div class="event-item">
                                    <p class="event-time">13:00</p>
                                    <p class="event-name">賓客入席</p>
                                    <img src="schedule/icon_church.png" alt="賓客入席" class="event-icon-img">
                                </div>
                                <div class="event-item">
                                    <p class="event-time">13:30</p>
                                    <p class="event-name">典禮開始</p>
                                    <img src="schedule/icon_doves.png" alt="典禮開始" class="event-icon-img">
                                </div>
                                <div class="event-item">
                                    <p class="event-time">15:00</p>
                                    <p class="event-name">茶會慶祝</p>
                                    <img src="schedule/icon_cake.png" alt="茶會慶祝" class="event-icon-img">
                                </div>
                            </div>
                        </div>

                        <div class="divider"></div>

                        <div class="schedule-column">
                            <div class="event-group">
                                <h3 class="group-title">結婚晚宴</h3>
                                <p class="group-loc">地點：兄弟飯店，桂花廳</p>
                                
                                <div class="event-item">
                                    <p class="event-time">18:00</p>
                                    <p class="event-name">晚宴簽到</p>
                                    <img src="schedule/icon_champagne.png" alt="晚宴簽到" class="event-icon-img">
                                </div>
                                <div class="event-item">
                                    <p class="event-time">18:30</p>
                                    <p class="event-name">晚宴開始</p>
                                    <img src="schedule/icon_bouquet.png" alt="晚宴開始" class="event-icon-img">
                                </div>
                                <div class="event-item">
                                    <p class="event-time">20:30</p>
                                    <p class="event-name">送客合影</p>
                                    <img src="schedule/icon_the_end.png" alt="送客合影" class="event-icon-img">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <footer style="text-align: center; padding: 40px 0; opacity: 0.5; font-size: 0.8rem;">
                    2026.10.10 | 凱翔 & 禹萱
                </footer>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 300);
        });
    </script>
</body>
</html>
