<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮邀請 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100%; width: 100%;
            font-family: var(--handwriting);
            color: var(--text-color);
            background-image: url('schedule/background.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            background-color: #ece5df;
            scroll-behavior: smooth;
        }

        .page-wrapper {
            perspective: 2000px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .card-inner {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-style: preserve-3d;
            position: relative;
            transform: rotateY(180deg); 
            background: transparent;
        }
        
        .loaded .card-inner { transform: rotateY(0deg); }

        .card-face {
            width: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section {
            width: 100%;
            max-width: 1200px;
            padding: 60px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero-title, .hero-date, .hero-quote, .guide-item h3, .guide-item p, .schedule-main-title, .rsvp-subtext {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 2px rgba(255,255,255,1);
        }

        .hero-title { font-size: 2.5rem; letter-spacing: 6px; margin-bottom: 10px; font-weight: 500; }
        .hero-date { font-size: 2rem; color: var(--accent-gold); margin-bottom: 40px; font-family: initial; }

        /* 引導區塊 */
        .guide-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 50px;
        }

        .guide-item {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            background: none;
            border: none;
            outline: none;
        }

        .guide-item:hover { transform: translateY(-10px); filter: brightness(1.05); }

        .guide-img-wrapper {
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
            position: relative;
            padding: 10px;
            border: 1px solid rgba(166, 124, 82, 0.3);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
        }

        .guide-img { width: 100%; height: auto; display: block; }
        .guide-item h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .guide-item p { font-size: 1.4rem; color: var(--accent-gold); font-family: initial; font-weight: 600; }

        /* 回覆出席 */
        .rsvp-container { text-align: center; margin-bottom: 80px; }
        .rsvp-button { width: 320px; height: 80px; background: url('schedule/respond_button.png') no-repeat center; background-size: contain; border: none; cursor: pointer; font-family: var(--handwriting); font-size: 1.6rem; color: #5d4a44; display: flex; justify-content: center; align-items: center; transition: 0.3s; padding-bottom: 5px; }
        .rsvp-button:hover { transform: scale(1.05); }
        .rsvp-subtext { font-size: 1rem; color: #5d4a44; margin-top: 15px; opacity: 0.9; }

        /* 故事區 */
        .story-section {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 60px;
            backdrop-filter: blur(3px);
            width: 100%;
            max-width: 1000px;
            min-height: auto; 
        }
        
        .story-content { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; }
        .hero-quote { font-size: 1.2rem; opacity: 0.9; line-height: 2; }
        .quote-left { text-align: left; margin-bottom: -5px; }
        .quote-right { text-align: right; margin-top: -5px; }
        .merged-photo-img { width: 100%; height: auto; display: block; margin: 0 auto; -webkit-mask-image: radial-gradient(circle, rgba(255,255,255,1) 75%, rgba(255,255,255,0) 100%); mask-image: radial-gradient(circle, rgba(255,255,255,1) 75%, rgba(255,255,255,0) 100%); }

        /* 行程表 */
        .schedule-content-wrapper {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 60px 40px;
            backdrop-filter: blur(5px);
            margin: 20px auto;
        }

        .schedule-main-title { font-size: 2rem; letter-spacing: 4px; text-align: center; margin-bottom: 40px; font-weight: 600; color: #4a3a35; }

        .schedule-grid { display: grid; grid-template-columns: 1fr 100px 1fr; width: 100%; }
        .schedule-column { display: flex; flex-direction: column; gap: 60px; }

        /* --- 修正：各自紅線處置中，並增加 15px Gap --- */
        .event-item { 
            display: flex; 
            align-items: center; 
            justify-content: center; /* 在各區域紅線置中 */
            gap: 30px; /* 增加 10px，總共 15px 的間隔 */
            margin-bottom: 40px; 
            width: 100%;
        }

        .event-text-stack { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: none; 
        }

        .event-icon-container { 
            display: flex; 
            justify-content: center; 
            flex: none; 
        }

        .event-time { font-weight: 600; font-size: 1.5rem; color: #4a3a35; font-family: initial; }
        .event-name { font-size: 1.3rem; margin: 5px 0 10px 0; letter-spacing: 2px; }

        .gold-line-divider { 
            width: 110px; 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent); 
            position: relative; 
            margin-top: 5px; 
        }
        .gold-line-divider::after { 
            content: '✶'; 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 16px; 
            color: var(--accent-gold); 
            background: rgba(255, 255, 255, 0.01); 
            padding: 0 5px; 
        }

        .event-icon-img { width: 100px; height: 100px; object-fit: contain; }

        /* 中央分隔線 */
        .divider-container { display: flex; flex-direction: column; align-items: center; height: 100%; }
        .divider-line { width: 1px; flex-grow: 1; background: var(--light-gold); position: relative; }
        .divider-line::after { content: '✶'; position: absolute; left: 50%; transform: translateX(-50%); color: var(--accent-gold); font-size: 18px; top: 40%; }
        .divider-ring-img { width: 80px; height: auto; margin: 25px 0; z-index: 2; }

        .event-group { text-align: center; }
        .group-title { font-size: 2rem; font-weight: 600; margin-bottom: 10px; color: #4a3a35; }
        .group-loc { font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 50px; letter-spacing: 2px; }

        @media (max-width: 768px) {
            section { padding: 40px 10px; min-height: auto; }
            .hero-title { font-size: 1.8rem; }
            .schedule-main-title { font-size: 1.6rem; margin-bottom: 30px; }
            .guide-container { flex-direction: column; gap: 30px; align-items: center; }
            .rsvp-button { width: 260px; height: 65px; font-size: 1.3rem; }
            .schedule-grid { grid-template-columns: 1fr 40px 1fr; }
            .divider-ring-img { width: 50px; }
            .event-icon-img { width: 70px; height: 70px; }
            .group-title { font-size: 1.4rem; }
            .event-item { gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="card-inner" id="mainCard">
            <div class="card-face">
                
                <section class="hero-section">
                    <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                    <p class="hero-date">10.10.2026</p>
                    
                    <div class="guide-container">
                        <div class="guide-item" onclick="scrollToId('ceremony-target')">
                            <div class="guide-img-wrapper">
                                <img src="schedule/main-church.png" alt="教堂婚禮彌撒" class="guide-img">
                            </div>
                            <h3>教堂婚禮彌撒</h3>
                            <p>13 : 00</p>
                        </div>
                        <div class="guide-item" onclick="scrollToId('banquet-target')">
                            <div class="guide-img-wrapper">
                                <img src="schedule/main-bouquet.png" alt="餐廳婚禮晚宴" class="guide-img">
                            </div>
                            <h3>餐廳婚禮晚宴</h3>
                            <p>18 : 00</p>
                        </div>
                    </div>

                    <div class="rsvp-container">
                        <button class="rsvp-button" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdX0pTRn6Xgd2ync0EHPiqUqXZl9hgQm8tBAS4sDOxQ8FcLFA/viewform?usp=header')">回覆出席</button>
                        <p class="rsvp-subtext">填寫 Google 表單，統計參與人數</p>
                    </div>
                </section>

                <section class="story-section">
                    <div class="story-content">
                        <p class="hero-quote quote-left">我們...沒有拍婚紗，雖然結婚是個紀念</p>
                        <img src="schedule/main.png" alt="婚禮照片" class="merged-photo-img">
                        <p class="hero-quote quote-right">在一起的每一天，更值得留念</p>
                    </div>
                </section>

                <section class="schedule-section">
                    <div class="schedule-content-wrapper">
                        <h2 class="schedule-main-title">我們的特別的日子</h2>
                        
                        <div class="schedule-grid">
                            <div class="schedule-column" id="ceremony-target">
                                <div class="event-group">
                                    <h3 class="group-title">結婚典禮</h3>
                                    <p class="group-loc">汐止天主堂</p>
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:00</p>
                                            <p class="event-name">賓客入席</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_church.png" class="event-icon-img">
                                        </div>
                                    </div>
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:30</p>
                                            <p class="event-name">典禮開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_doves.png" class="event-icon-img">
                                        </div>
                                    </div>
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">15:00</p>
                                            <p class="event-name">茶會慶祝</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_cake.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="divider-container">
                                <div class="divider-line"></div>
                                <img src="schedule/icon_ring.png" alt="戒指" class="divider-ring-img">
                                <div class="divider-line"></div>
                            </div>

                            <div class="schedule-column" id="banquet-target">
                                <div class="event-group">
                                    <h3 class="group-title">結婚晚宴</h3>
                                    <p class="group-loc">兄弟飯店，桂花廳</p>
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:00</p>
                                            <p class="event-name">晚宴簽到</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_champagne.png" class="event-icon-img">
                                        </div>
                                    </div>
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:30</p>
                                            <p class="event-name">晚宴開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_bouquet.png" class="event-icon-img">
                                        </div>
                                    </div>
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">20:30</p>
                                            <p class="event-name">送客合影</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_the_end.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="back-home-container">
                    <a class="back-home-button" style="text-decoration:none; padding:12px 50px; border:2px solid var(--accent-gold); border-radius:30px; color:var(--text-color); margin-top: 40px; display: inline-block;" href="https://sharyuwu.github.io/wedding/">← 返回邀請函首頁</a>
                </div>

                <footer style="text-align: center; padding: 40px 0; opacity: 0.5; font-size: 1rem;">
                    2026.10.10 | 凱翔 & 禹萱
                </footer>
            </div>
        </div>
    </div>

    <script>
        function scrollToId(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 300);
        });
    </script>
</body>
</html>
