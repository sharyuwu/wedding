<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮行程 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Noto Serif TC", "Klee One", serif;
            --bg-color: #fdfaf7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--handwriting);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 頂部標題區 --- */
        .header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--accent-gold);
            letter-spacing: 2px;
        }

        /* --- 行程容器 --- */
        .schedule-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 電腦版 2x2 */
            gap: 30px;
        }

        /* --- 行程卡片 --- */
        .schedule-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(166, 124, 82, 0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .schedule-item:hover {
            transform: translateY(-5px);
        }

        /* 圖片區域 */
        .item-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 內容區域 */
        .item-info {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .item-info h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .en-title {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .time-badge {
            display: inline-block;
            padding: 6px 25px;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* --- 返回按鈕 --- */
        .back-nav {
            text-align: center;
            margin-bottom: 50px;
        }

        .btn-back {
            text-decoration: none;
            color: #aaa;
            font-size: 0.9rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        /* --- 手機版適配 --- */
        @media screen and (max-width: 768px) {
            .header { padding: 40px 20px 30px; }
            .header h1 { font-size: 1.8rem; }
            
            .schedule-container {
                grid-template-columns: 1fr; /* 手機版變直排一列 */
                gap: 20px;
            }

            .item-img {
                height: 180px; /* 手機版縮小圖片高度 */
            }

            .item-info {
                padding: 20px;
            }

            .item-info h3 { font-size: 1.3rem; }
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>婚禮行程表</h1>
        <p>Wedding Schedule</p>
    </header>

    <main class="schedule-container">
        <div class="schedule-item">
            <div class="item-img" style="background-image: url('schedule-1.webp');"></div>
            <div class="item-info">
                <h3>簽到時間</h3>
                <p class="en-title">Guest Arrival</p>
                <div class="time-badge">1:00 P.M</div>
            </div>
        </div>

        <div class="schedule-item">
            <div class="item-img" style="background-image: url('schedule-2.webp');"></div>
            <div class="item-info">
                <h3>婚禮彌撒</h3>
                <p class="en-title">Ceremony</p>
                <div class="time-badge">1:30 P.M</div>
            </div>
        </div>

        <div class="schedule-item">
            <div class="item-img" style="background-image: url('schedule-3.webp');"></div>
            <div class="item-info">
                <h3>晚宴進場</h3>
                <p class="en-title">Banquet Arrival</p>
                <div class="time-badge">6:00 P.M</div>
            </div>
        </div>

        <div class="schedule-item">
            <div class="item-img" style="background-image: url('schedule-4.webp');"></div>
            <div class="item-info">
                <h3>晚宴開始</h3>
                <p class="en-title">Dinner</p>
                <div class="time-badge">6:30 P.M</div>
            </div>
        </div>
    </main>

    <div class="back-nav">
        <a href="index.html" class="btn-back">← 返回邀請函首頁</a>
    </div>

</body>

</html>
