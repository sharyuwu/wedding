<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>婚禮邀請 - 凱翔 & 禹萱</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100%; width: 100%;
            font-family: var(--handwriting);
            color: var(--text-color);
            
            /* 背景圖層疊 */
            background-image: 
                url('background_flower.png'), 
                url('schedule/background.png');
            background-repeat: no-repeat, no-repeat;
            background-position: center top, center center;
            background-size: auto 600px, cover;
            background-attachment: scroll, fixed;
            background-color: #ece5df;
        }

        .page-wrapper {
            perspective: 2000px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .card-inner {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-style: preserve-3d;
            position: relative;
            transform: rotateY(180deg); 
            background: transparent;
        }
        
        .loaded .card-inner { transform: rotateY(0deg); }

        .card-face {
            width: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section {
            width: 100%;
            max-width: 1200px;
            padding: 80px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero-title, .hero-quote {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 2px rgba(255,255,255,1);
        }

        .hero-title { font-size: 2.8rem; letter-spacing: 8px; margin-bottom: 15px; font-weight: 500; }
        .hero-date { font-size: 2rem; color: var(--accent-gold); margin-bottom: 40px; font-family: initial; }

        .merged-photo-container {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            -webkit-mask-image: radial-gradient(circle, rgba(255,255,255,1) 60%, rgba(255,255,255,0) 100%);
            mask-image: radial-gradient(circle, rgba(255,255,255,1) 60%, rgba(255,255,255,0) 100%);
        }

        .merged-photo-img { width: 100%; height: auto; display: block; }

        .rsvp-button {
            margin-top: 40px;
            padding: 15px 80px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--accent-gold);
            color: var(--text-color);
            font-family: var(--handwriting);
            font-size: 1.4rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- Schedule Section --- */
        .schedule-content-wrapper {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 60px 40px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 20px auto;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 100px 1fr; /* 增加中間寬度以容納戒指圖片 */
            width: 100%;
        }

        .schedule-column { display: flex; flex-direction: column; gap: 60px; }

        /* --- 核心修改：三段式分隔線設計 --- */
        .divider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        .divider-line {
            width: 1px;
            background: var(--light-gold);
            flex-grow: 1;
            position: relative;
        }

        /* 模擬截圖中的星芒裝飾 */
        .divider-line::after {
            content: '✶';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent-gold);
            font-size: 18px;
            /* 讓星芒出現在線條的中段 */
            top: 40%;
        }

        .divider-ring-img {
            width: 90px; /* 根據圖片大小調整 */
            height: auto;
            margin: 25px 0;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        .event-group { text-align: center; }
        .group-title { font-size: 2rem; font-weight: 600; margin-bottom: 10px; color: #4a3a35; }
        .group-loc { font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 50px; letter-spacing: 2px; }

        .event-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-text-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .event-time { font-weight: 600; font-size: 1.5rem; color: #4a3a35; font-family: initial; }
        .event-name { font-size: 1.3rem; margin: 5px 0 10px 0; letter-spacing: 2px; }

        .gold-line-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            position: relative;
        }
        .gold-line-divider::after {
            content: '✶';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.01);
            padding: 0 5px;
        }

        .event-icon-container { flex: 1; display: flex; justify-content: center; }
        .event-icon-img { width: 110px; height: 110px; object-fit: contain; }

        @media (max-width: 768px) {
            section { padding: 40px 10px; }
            .schedule-content-wrapper { padding: 40px 15px; }
            .schedule-grid { grid-template-columns: 1fr 60px 1fr; }
            .divider-ring-img { width: 50px; margin: 15px 0; }
            .divider-line::after { font-size: 12px; }
            .event-icon-img { width: 70px; height: 70px; }
            .group-title { font-size: 1.4rem; }
            .event-time { font-size: 1.1rem; }
            .event-name { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="card-inner" id="mainCard">
            <div class="card-face">
                
                <section class="hero-section">
                    <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                    <p class="hero-date">10.10.2026</p>
                    <p class="hero-quote">我們...沒有拍婚紗，雖然結婚是個紀念</p>
                    <div class="merged-photo-container">
                        <img src="schedule/main.png" alt="婚禮照片" class="merged-photo-img">
                    </div>
                    <p class="hero-quote">在一起的每一天，更值得留念</p>
                    <button class="rsvp-button" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdX0pTRn6Xgd2ync0EHPiqUqXZl9hgQm8tBAS4sDOxQ8FcLFA/viewform?usp=header')">回覆出席</button>
                </section>

                <section class="schedule-section">
                    <div class="schedule-content-wrapper">
                        <div class="schedule-grid">
                            
                            <div class="schedule-column">
                                <div class="event-group">
                                    <h3 class="group-title">結婚典禮</h3>
                                    <p class="group-loc">汐止天主堂</p>
                                    
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:00</p>
                                            <p class="event-name">賓客入席</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_church.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">13:30</p>
                                            <p class="event-name">典禮開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_doves.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">15:00</p>
                                            <p class="event-name">茶會慶祝</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_cake.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="divider-container">
                                <div class="divider-line"></div>
                                <img src="schedule/icon_ring.png" alt="戒指" class="divider-ring-img">
                                <div class="divider-line"></div>
                            </div>

                            <div class="schedule-column">
                                <div class="event-group">
                                    <h3 class="group-title">結婚晚宴</h3>
                                    <p class="group-loc">兄弟飯店，桂花廳</p>
                                    
                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:00</p>
                                            <p class="event-name">晚宴簽到</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_champagne.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">18:30</p>
                                            <p class="event-name">晚宴開始</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_bouquet.png" class="event-icon-img">
                                        </div>
                                    </div>

                                    <div class="event-item">
                                        <div class="event-text-stack">
                                            <p class="event-time">20:30</p>
                                            <p class="event-name">送客合影</p>
                                            <div class="gold-line-divider"></div>
                                        </div>
                                        <div class="event-icon-container">
                                            <img src="schedule/icon_the_end.png" class="event-icon-img">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <footer style="text-align: center; padding: 60px 0; opacity: 0.5; font-size: 1rem;">
                    2026.10.10 | 凱翔 & 禹萱
                </footer>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 300);
        });
    </script>
</body>
</html>
