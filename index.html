<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fdfdfd; /* 確保底色與圖案背景一致 */
            overflow: hidden;
            font-family: var(--handwriting);
        }

        /* 背景層 */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            background-repeat: no-repeat;
            background-position: center center;
            
            /* --- 改為 contain：圖片不裁切 --- */
            background-image: url('main-background.png');
            background-size: contain; 
        }

        /* 手機版背景切換 */
        @media (max-width: 600px) {
            .content-layer {
                background-image: url('main-background-phone.png');
                /* --- 改為 contain：確保手機版圖片也完整 --- */
                background-size: contain; 
            }
            .welcome-text { font-size: 2.8rem; }
            .date-text { font-size: 1.2rem; margin-bottom: 30px; }
            .names { font-size: 1.8rem; }
            .enter-button { padding: 10px 35px; }
        }

        /* 紗簾動畫 */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
        }
        .curtain {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .curtain.left { transform: translateX(0); border-right: 1px solid rgba(255,255,255,0.1); }
        .curtain.right { transform: translateX(0); }
        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }
        .seal-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: opacity 1.2s ease;
        }
        .opened .seal-wrapper { opacity: 0; }
        .seal {
            width: 80px;
            height: 80px;
            background: var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 文字樣式 */
        .welcome-text {
            font-weight: 600;
            font-size: 3.8rem;
            color: var(--text-color);
            margin-top: -80px;
            margin-bottom: 10px;
        }

        .date-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 80px;
        }

        .names {
            font-weight: 600;
            font-size: 2.2rem;
            margin-top: 20px;
        }

        .tagline {
            font-size: 1.3rem;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        /* 按鈕樣式 */
        .enter-button {
            margin-top: 60px;
            padding: 12px 50px;
            background: white;
            border: 1px solid var(--accent-gold);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: auto;
            font-family: var(--handwriting);
        }
        .enter-button:hover { background: var(--accent-gold); color: white; }
    </style>
</head>
<body>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper"><div class="seal">囍</div></div>
    </div>

    <div class="content-layer">
        <h1 class="welcome-text">歡迎來參加</h1>
        <div class="date-text">10 - 10 - 2026</div>
        <div class="names">凱翔與禹萱</div>
        <div class="tagline">我們要結婚了！</div>
        <a href="schedule.html" class="enter-button">開啟邀請函</a>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.body.classList.add('opened');
            }, 1000);
        };
    </script>
</body>
</html>
