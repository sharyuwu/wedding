<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    
    <title>凱翔 & 禹萱 Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 1. 底層背景：滿版佔滿螢幕 */
        body,
        html {
            height: 100%;
            width: 100%;
            background-image: url('base-background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
            font-family: var(--handwriting);
        }

        /* 2. 中層內容：透明疊加主圖 */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            background-image: url('main-background-new.png');
            background-color: transparent;
        }

        /* 紗簾動畫層 */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
        }

        .curtain {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .curtain.left {
            transform: translateX(0);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .curtain.right {
            transform: translateX(0);
        }

        .opened .curtain.left {
            transform: translateX(-100%);
        }

        .opened .curtain.right {
            transform: translateX(100%);
        }

        .seal-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: opacity 1.2s ease;
        }

        .opened .seal-wrapper {
            opacity: 0;
        }

        .seal {
            width: 80px;
            height: 80px;
            background: var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* --- 文字樣式 --- */
        .welcome-text {
            font-weight: 600;
            font-size: 3.8rem;
            color: var(--text-color);
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .date-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 40px;
        }

        .names {
            font-weight: 600;
            font-size: 2.2rem;
            padding-top: 350px;
            margin-top: 0;
        }

        .tagline {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-top: 15px;
            color: var(--text-color);
            min-height: 1.6em;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .tagline.visible {
            opacity: 1;
        }

        .enter-button {
            margin-top: 20px;
            padding: 12px 50px;
            background: white;
            border: 1px solid var(--accent-gold);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            font-family: var(--handwriting);
        }

        .enter-button:hover {
            background: var(--accent-gold);
            color: white;
        }

        /* --- 手機版適配 --- */
        @media screen and (max-width: 768px) {

            body,
            html {
                background-image: url('base-background.png');
            }

            .content-layer {
                background-image: url('main-background-phone-new.png') !important;
                background-size: contain !important;
            }

            .welcome-text {
                font-size: 2.0rem !important;
                margin-top: 0px !important;
            }

            .date-text {
                font-size: 1.0rem;
                margin-bottom: 20px;
            }

            .names {
                font-size: 1.0rem;
                padding-top: 140px !important;
                margin-top: 0 !important;
            }
            
            .tagline {
                font-size: 1.0rem;
        }
        }
    </style>
</head>

<body>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper">
            <div class="seal">囍</div>
        </div>
    </div>

    <div class="content-layer">
        <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
        <div class="date-text">10 - 10 - 2026</div>

        <div class="names">凱翔與禹萱</div>

        <div id="dynamicTagline" class="tagline"></div>

        <a href="schedule.html" class="enter-button">開啟邀請函</a>
    </div>

    <script>
        // 設定動態文字內容
        const phrases = [
            "大家好～",
            "我們要結婚了！",
            "誠摯的邀請大家參加我們的婚禮",
            "婚禮分為下午與晚上場",
            "分別是下午的教堂婚禮與晚上的兄弟飯店喜宴",
            "我們需要統計喜宴桌數",
            "要參加晚上喜宴的朋友，請記得在邀請函裡填表",
            "我們當天見，感謝大家的祝福"
        ];

        let currentIndex = 0;
        const taglineEl = document.getElementById('dynamicTagline');
        let taglineInterval;

        function updateTagline() {
            // 1. 先淡出
            taglineEl.classList.remove('visible');

            setTimeout(() => {
                // 2. 更換文字
                taglineEl.innerText = phrases[currentIndex];

                // 3. 再淡入
                taglineEl.classList.add('visible');

                // 4. 檢查是否到達最後一句 (第 6 句，索引 5)
                if (currentIndex === phrases.length - 1) {
                    clearInterval(taglineInterval);
                    console.log("已到達最後一句，動畫停止。");
                } else {
                    currentIndex++;
                }
            }, 800);
        }

        window.onload = function() {
            // 1 秒後開啟紗簾
            setTimeout(function() {
                document.body.classList.add('opened');

                // 啟動文字輪播
                updateTagline();
                taglineInterval = setInterval(updateTagline, 5000); // 每 5 秒切換
            }, 1000);
        };
    </script>
</body>

</html>
