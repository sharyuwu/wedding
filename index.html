<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>凱翔 & 禹萱 Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 整合兩頁的變數 */
            --text-color-dark: #2c3e50;
            --text-color-brown: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* --- 核心滑動設定 --- */
        html, body {
            height: 100%;
            width: 100%;
            font-family: var(--handwriting);
            background-color: #fdfaf7;
            /* 啟用 Scroll Snap */
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .snap-section {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            overflow: hidden;
        }

        /* --- Index 頁面樣式 (Hero Section) --- */
        #hero-section {
            z-index: 10;
            perspective: 2000px;
        }

        .layer-base, .layer-mid, .layer-top {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s;
        }
        
        .layer-base {
            background: url('base-background-V1.png') center center / cover no-repeat;
            z-index: 1; transform-style: preserve-3d; backface-visibility: hidden;
        }
        .layer-base.is-flipped { transform: rotateY(-180deg) scale(1.1); opacity: 0; }

        .layer-mid { background: url('main-image-layer-mid.png') center center / auto no-repeat; z-index: 2; pointer-events: none; }
        .layer-top { background: url('main-image-layer-top.png') center center / cover no-repeat; z-index: 3; pointer-events: none; }
        .is-leaving .layer-mid, .is-leaving .layer-top { opacity: 0; }

        .content-layer {
            position: relative; z-index: 10; height: 100%; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px; opacity: 0;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .content-layer.visible { opacity: 1; }
        .content-layer.is-leaving { opacity: 0; transform: translateZ(-100px); }

        .spacer-gap { width: 100%; height: 40vh; }
        .welcome-text { font-size: 3.5rem; color: var(--text-color-dark); margin-bottom: 5px; }
        .date-text { font-size: 1.5rem; letter-spacing: 5px; }
        .names { font-weight: 600; font-size: 2.2rem; }
        .tagline { font-size: 1.4rem; margin-top: 10px; min-height: 1.6em; color: var(--text-color-dark); opacity: 0; transition: 0.4s; }
        .tagline.visible { opacity: 1; }

        .enter-button {
            margin-top: 20px; padding: 12px 50px; background: white;
            border: 1px solid var(--accent-gold); color: var(--text-color-dark);
            text-decoration: none; border-radius: 30px; font-size: 1.1rem;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); cursor: pointer;
        }

        /* --- 紗簾樣式 --- */
        .curtain-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; }
        .curtain { flex: 1; height: 100%; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }
        .seal-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; transition: opacity 0.8s; text-align: center; cursor: pointer; }
        .opened .seal-wrapper { opacity: 0; pointer-events: none; }
        .seal { width: 90px; height: 90px; background: var(--accent-gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; animation: seal-breathe 2.5s infinite; }
        @keyframes seal-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* --- Schedule 頁面樣式 (Scrollable Section) --- */
        #schedule-section {
            background-image: url('schedule/background.jpg');
            background-attachment: fixed; /* 讓背景有視差感 */
            background-size: cover;
            background-position: center;
            overflow-y: auto; /* 允許內部微調捲動 */
        }

        .schedule-container {
            width: 100%; min-height: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; color: var(--text-color-brown);
        }

        /* 卡片翻轉效果 */
        .card-inner {
            width: 100%; max-width: 1100px;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            transform: rotateY(180deg);
        }
        .loaded .card-inner { transform: rotateY(0deg); }

        .hero-title { font-size: 2.5rem; letter-spacing: 6px; margin-bottom: 10px; text-align: center; }
        .hero-date-small { font-size: 2rem; color: var(--accent-gold); margin-bottom: 40px; text-align: center; }

        .guide-container { display: flex; justify-content: center; gap: 40px; width: 100%; margin-bottom: 50px; }
        .guide-item { text-align: center; cursor: pointer; transition: 0.3s; }
        .guide-img-wrapper { max-width: 350px; padding: 10px; border: 1px solid rgba(166, 124, 82, 0.3); border-radius: 8px; background: rgba(255, 255, 255, 0.4); }
        .guide-img { width: 100%; border-radius: 4px; }
        .guide-item p { font-size: 1.4rem; color: var(--accent-gold); font-weight: 600; }

        .schedule-content-wrapper { background: rgba(255, 255, 255, 0.6); border-radius: 40px; padding: 40px; backdrop-filter: blur(5px); margin-top: 40px; }
        .schedule-grid { display: grid; grid-template-columns: 1fr 80px 1fr; width: 100%; }
        .event-item { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .event-time { font-size: 1.5rem; font-weight: 600; }
        .event-icon-img { width: 80px; height: 80px; }

        /* --- 手機版優化 --- */
        @media screen and (max-width: 768px) {
            .welcome-text { font-size: 1.8rem; }
            .spacer-gap { height: 50dvh; }
            .guide-container { gap: 10px; }
            .guide-img-wrapper { max-width: 160px; }
            .schedule-grid { grid-template-columns: 1fr; }
            /* 手機版 Index 背景 */
            .layer-base { background-image: url('base-background-mobile.png'); }
        }
    </style>
</head>

<body>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper" onclick="startApp()">
            <div class="seal">囍</div>
            <div style="margin-top:15px; color:var(--accent-gold)">點擊開啟</div>
        </div>
    </div>

    <section class="snap-section" id="hero-section">
        <div class="layer-base" id="baseLayer"></div>
        <div class="layer-mid" id="midLayer"></div>
        <div class="layer-top" id="topLayer"></div>

        <div class="content-layer" id="mainContent">
            <div>
                <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
                <div class="date-text">10 - 10 - 2026</div>
            </div>

            <div class="spacer-gap"></div>

            <div class="text-bottom-group">
                <div class="names">凱翔 & 禹萱</div>
                <div id="dynamicTagline" class="tagline"></div>
                <a href="javascript:void(0)" class="enter-button" onclick="goToSchedule()">打開邀請函</a>
            </div>
        </div>
    </section>

    <section class="snap-section" id="schedule-section">
        <div class="schedule-container" id="scheduleContent">
            <div class="card-inner">
                <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                <p class="hero-date-small">10.10.2026</p>

                <div class="guide-container">
                    <div class="guide-item" onclick="scrollToTarget('ceremony-target')">
                        <div class="guide-img-wrapper"><img src="schedule/main-church.png" class="guide-img"></div>
                        <h3>教堂婚禮彌撒</h3>
                        <p>13 : 00</p>
                    </div>
                    <div class="guide-item" onclick="scrollToTarget('banquet-target')">
                        <div class="guide-img-wrapper"><img src="schedule/main-bouquet.png" class="guide-img"></div>
                        <h3>餐廳婚禮晚宴</h3>
                        <p>18 : 00</p>
                    </div>
                </div>

                <div style="text-align:center; margin: 40px 0;">
                    <p>“ 在一起的每一天，更令人留念 ”</p>
                    <img src="schedule/main.png" style="width:100%; max-width:600px; border-radius:20px; margin-top:20px;">
                </div>

                <div class="schedule-content-wrapper">
                    <div class="schedule-grid">
                        <div id="ceremony-target">
                            <h3 style="text-align:center">結婚典禮</h3>
                            <p style="text-align:center; color:var(--accent-gold)">汐止天主堂</p>
                            <div class="event-item">
                                <p class="event-time">13:30</p>
                                <img src="schedule/icon_doves.png" class="event-icon-img">
                                <p>典禮開始</p>
                            </div>
                        </div>
                        <div style="display:flex; justify-content:center; align-items:center;">
                            <div style="width:1px; height:100%; background:var(--light-gold);"></div>
                        </div>
                        <div id="banquet-target">
                            <h3 style="text-align:center">結婚晚宴</h3>
                            <p style="text-align:center; color:var(--accent-gold)">兄弟飯店</p>
                            <div class="event-item">
                                <p class="event-time">18:30</p>
                                <img src="schedule/icon_bouquet.png" class="event-icon-img">
                                <p>晚宴開始</p>
                            </div>
                        </div>
                    </div>
                </div>

                <footer style="text-align: center; padding: 60px 0; opacity: 0.5;">
                    2026.10.10 | 凱翔 & 禹萱
                </footer>
            </div>
        </div>
    </section>

    <script>
        const phrases = ["大家好～", "我們要結婚了！", "誠摯邀請大家參加我們的婚禮", "我們當天見，感謝大家的祝福"];
        let currentIndex = 0;
        const taglineEl = document.getElementById('dynamicTagline');

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            const hasOpened = sessionStorage.getItem('wedding_opened');
            if (hasOpened === 'true') {
                document.getElementById('curtainLayer').remove();
                showMainContent();
            }
            
            // 偵測捲動來觸發 schedule 的翻牌動畫
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.getElementById('scheduleContent').classList.add('loaded');
                    }
                });
            }, { threshold: 0.2 });
            
            observer.observe(document.getElementById('schedule-section'));
        });

        function startApp() {
            sessionStorage.setItem('wedding_opened', 'true');
            document.body.classList.add('opened');
            setTimeout(showMainContent, 1000);
            setTimeout(() => document.getElementById('curtainLayer').remove(), 3000);
        }

        function showMainContent() {
            document.getElementById('mainContent').classList.add('visible');
            updateTagline();
        }

        function updateTagline() {
            if (!taglineEl) return;
            taglineEl.classList.remove('visible');
            setTimeout(() => {
                taglineEl.innerText = phrases[currentIndex];
                setTimeout(() => taglineEl.classList.add('visible'), 50);
                if (currentIndex < phrases.length - 1) {
                    currentIndex++;
                    setTimeout(updateTagline, 4000);
                }
            }, 500);
        }

        // 核心轉場函式
        function goToSchedule() {
            // 執行 Index 的退場動畫
            document.getElementById('baseLayer').classList.add('is-flipped');
            document.getElementById('mainContent').classList.add('is-leaving');
            document.getElementById('hero-section').classList.add('is-leaving');

            // 平滑捲動到下一頁
            setTimeout(() => {
                document.getElementById('schedule-section').scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }

        function scrollToTarget(id) {
            const target = document.getElementById(id);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
