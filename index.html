<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>凱翔 & 禹萱 Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: var(--handwriting);
            background-color: #fdfaf7;
            /* 在最外層建立 3D 透視空間 */
            perspective: 2000px;
        }

        /* --- 三層背景系統 --- */
        .layer-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('base-background-V1.png') center center / cover no-repeat;
            z-index: 1;
            /* 讓背景層具備翻轉動畫能力 */
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        /* 當點擊時，背景層向左翻轉並淡出 */
        .layer-base.is-flipped {
            transform: rotateY(-180deg) scale(1.1);
            opacity: 0;
        }

        .layer-mid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('main-image-layer-mid.png') center center / auto no-repeat;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.8s;
        }

        .layer-top {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('main-image-layer-top.png') center center / cover no-repeat;
            z-index: 3;
            pointer-events: none;
            transition: opacity 0.8s;
        }

        /* 當點擊時，裝飾層直接淡出 */
        .is-leaving .layer-mid, .is-leaving .layer-top {
            opacity: 0;
        }

        /* --- 文字內容層 --- */
        .content-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 0;
            /* 文字層不翻轉，只做淡出與輕微縮小 */
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .content-layer.visible { opacity: 1; }

        /* 文字離開時的效果：淡出並微微向後退 */
        .content-layer.is-leaving {
            opacity: 0;
            transform: translateZ(-100px);
        }

        /* --- 調整文字位置的間距元件 --- */
        .desktop-spacer {
            width: 100%;
            height: 300px;
        }
        
        .mobile-bottom-push {
            height: 50px;
        }

        .welcome-text { font-size: 3.5rem; color: var(--text-color); margin-bottom: 5px; margin-top: 50px;}
        .date-text { font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 20px; }
        
        .names {
            font-weight: 600;
            font-size: 2.2rem;
            margin-top: 0;
        }

        .tagline {
            font-size: 1.4rem; margin-top: 0px; min-height: 1.6em;
            color: var(--text-color); opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease-in-out, visibility 0.4s;
        }
        .tagline.visible { opacity: 1; visibility: visible; }

        .enter-button {
            margin-top: 15px; padding: 12px 50px; background: white;
            border: 1px solid var(--accent-gold); color: var(--text-color);
            text-decoration: none; border-radius: 30px; font-size: 1.1rem;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            display: inline-block;
        }

        /* --- 紗簾與囍字樣式 --- */
        .curtain-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; }
        .curtain { flex: 1; height: 100%; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }
        .seal-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; transition: opacity 0.8s; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .opened .seal-wrapper { opacity: 0; pointer-events: none; }
        .seal { width: 90px; height: 90px; background: var(--accent-gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: seal-breathe 2.5s infinite; }
        .click-prompt { margin-top: 15px; color: var(--accent-gold); font-size: 1rem; animation: click-prompt-fade 2.5s infinite; }
        @keyframes seal-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        @keyframes click-prompt-fade { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        /* --- 手機版適配 --- */
        @media screen and (max-width: 768px) {
            .layer-base { background-image: url('base-background-mobile.png'); }
            .layer-mid { 
                background-image: url('main-image-layer-mid-mobile-V4.png'); 
                background-size: auto;
            }
            .layer-top {         
                background-image: url('main-image-layer-top-mobile-V4.png');
                background-size: cover;
                background-position: center center;
            }
            
            .mobile-bottom-push { height: 130px; }
            .desktop-spacer { height: 330px; }

            .welcome-text {
                font-size: 1.8rem;
                margin-top: 0px;
            }
            .names { font-size: 1.6rem; }
            .tagline { font-size: 1.1rem; }
            .enter-button { margin-top: 10px; padding: 10px 40px; }
            .seal { width: 80px; height: 80px; font-size: 1.8rem; }
        }
    </style>
</head>

<body>

    <div class="layer-base" id="baseLayer"></div>
    <div class="layer-mid" id="midLayer"></div>
    <div class="layer-top" id="topLayer"></div>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper" onclick="startApp()">
            <div class="seal">囍</div>
            <div class="click-prompt">點擊開啟</div>
        </div>
    </div>

    <div class="content-layer" id="mainContent">
        <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
        <div class="date-text">10 - 10 - 2026</div>

        <div class="desktop-spacer"></div>

        <div class="names">凱翔 & 禹萱</div>
        <div id="dynamicTagline" class="tagline"></div>
        
        <a href="javascript:void(0)" class="enter-button" onclick="goToSchedule()">打開邀請函</a>
        
        <div class="mobile-bottom-push"></div>
    </div>

    <script>
        const phrases = ["大家好～", "我們要結婚了！", "誠摯邀請大家參加我們的婚禮", "我們當天見，感謝大家的祝福"];
        let currentIndex = 0;
        const taglineEl = document.getElementById('dynamicTagline');

        // 檢查登錄紀錄
        window.addEventListener('DOMContentLoaded', () => {
            const hasOpened = localStorage.getItem('wedding_opened');
            if (hasOpened === 'true') {
                const curtainLayer = document.getElementById('curtainLayer');
                if (curtainLayer) curtainLayer.remove();
                document.getElementById('mainContent').classList.add('visible');
                updateTagline();
            }
        });

        function startApp() {
            localStorage.setItem('wedding_opened', 'true');
            document.body.classList.add('opened');
            setTimeout(() => {
                document.getElementById('mainContent').classList.add('visible');
                updateTagline();
            }, 1000);
            setTimeout(() => {
                const curtain = document.getElementById('curtainLayer');
                if (curtain) curtain.remove();
            }, 3000);
        }

        function updateTagline() {
            taglineEl.classList.remove('visible');
            setTimeout(() => {
                taglineEl.innerText = phrases[currentIndex];
                setTimeout(() => { taglineEl.classList.add('visible'); }, 50);
                if (currentIndex < phrases.length - 1) {
                    currentIndex++;
                    setTimeout(updateTagline, 4000);
                }
            }, 500); 
        }

        // --- 核心邏輯：翻轉背景，淡出內容 ---
        function goToSchedule() {
            // 1. 讓最底層背景翻轉
            document.getElementById('baseLayer').classList.add('is-flipped');
            
            // 2. 讓中間與最上層裝飾淡出
            document.body.classList.add('is-leaving');
            
            // 3. 讓文字內容淡出
            document.getElementById('mainContent').classList.add('is-leaving');

            // 4. 跳轉
            setTimeout(() => {
                window.location.href = "schedule.html";
            }, 850);
        }
    </script>
</body>
</html>
