<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fdfdfd;
            overflow: hidden;
            font-family: 'Noto Serif TC', serif;
        }

        /* 背景底層內容 (邀請函主視覺) */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white url('main-background.png') no-repeat center center/contain;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
        }

        /* 紗簾容器 */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none; /* 防止遮擋點擊 */
            display: flex;
        }

        /* 紗簾本體 (左、右兩片) */
        .curtain {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.6); /* 半透明白色 */
            backdrop-filter: blur(8px); /* 磨砂玻璃/薄紗感 */
            -webkit-backdrop-filter: blur(8px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); /* 緩慢開簾 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .curtain.left {
            transform: translateX(0);
            border-right: 1px solid rgba(255,255,255,0.3);
        }

        .curtain.right {
            transform: translateX(0);
        }

        /* 開啟動畫狀態 */
        .opened .curtain.left {
            transform: translateX(-100%);
        }

        .opened .curtain.right {
            transform: translateX(100%);
        }

        /* 紗簾中心的小裝飾 (例如 囍 字) */
        .seal-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: opacity 1s ease;
        }

        .opened .seal-wrapper {
            opacity: 0; /* 開簾時印記淡出 */
        }

        .seal {
            width: 80px;
            height: 80px;
            background: var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 文字與按鈕樣式 */
        .welcome-text {
            font-family: 'Comic Sans MS', cursive;
            font-size: 4.5rem;
            color: var(--text-color);
            margin-top: -10px; /* 負值向上移動，正值向下移動 */
            margin-bottom: 10px;
        }

        .date-text {
            font-size: 1.6rem;
            letter-spacing: 6px;
            margin-bottom: 80px;
        }

        .names {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
        }

        .tagline {
            font-size: 1.4rem;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        .enter-button {
            margin-top: 60px;
            padding: 12px 50px;
            background: white;
            border: 1px solid var(--accent-gold);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: auto; /* 確保按鈕可點擊 */
        }

        .enter-button:hover {
            background: var(--accent-gold);
            color: white;
        }

        /* RWD */
        @media (max-width: 600px) {
            .welcome-text { font-size: 3rem; }
            .date-text { font-size: 1.2rem; margin-bottom: 40px; }
            .names { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        
        <div class="seal-wrapper">
            <div class="seal">囍</div>
        </div>
    </div>

    <div class="content-layer">
        <h1 class="welcome-text">歡迎來參加</h1>
        <div class="date-text">10 - 10 - 2026</div>
        
        <div class="names">凱翔與禹萱</div>
        <div class="tagline">我們要結婚了！</div>

        <a href="schedule.html" class="enter-button">開啟邀請函</a>
    </div>

    <script>
        // 頁面載入 1 秒後，緩慢滑開紗簾
        window.onload = function() {
            setTimeout(function() {
                document.body.classList.add('opened');
            }, 1000);
        };
    </script>

</body>
</html>
