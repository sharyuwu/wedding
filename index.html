<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>

    <link rel="preload" as="image" href="base-background-V1.png">

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: var(--handwriting);
            background-color: #fdfaf7; /* 預設底色防止閃白 */
        }

        /* --- 三層背景架構 --- */

        /* 1. 底層：佔滿全版面 */
        .layer-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('base-background-V1.png') center center / cover no-repeat;
            z-index: -1;
        }

        /* 2. 中層：不被縮放 (保持原圖比例並居中) */
        .layer-mid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('main-image-layer-mid.png') center center / auto no-repeat;
            z-index: -2;
            /* 如果圖片太大，手機版會自動裁切邊緣而非縮放 */
        }

        /* 3. 頂層：佔滿全版面 (覆蓋在最上面) */
        .layer-top {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('main-image-layer-top.png') center center / cover no-repeat;
            z-index: -3;
            pointer-events: none; /* 避免頂層圖層擋住按鈕點擊 */
        }

        /* --- 內容層 (文字與按鈕) --- */
        .content-layer {
            position: relative;
            z-index: 10; /* 確保在背景之上 */
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .content-layer.visible { opacity: 1; }

        /* 紗簾部分保持邏輯，但優化 z-index */
        .curtain-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex;
        }

        .curtain {
            flex: 1; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }

        /* 文字樣式 (承襲您之前的設定) */
        .welcome-text { font-size: 3.8rem; color: var(--text-color); margin-bottom: 10px; }
        .names { font-size: 2.2rem; margin-top: 200px; font-weight: 600; }
        .tagline { margin-top: 20px; min-height: 1.6em; opacity: 0; transition: opacity 0.8s; }
        .tagline.visible { opacity: 1; }

        .enter-button {
            margin-top: 30px; padding: 12px 50px;
            background: white; border: 1px solid var(--accent-gold);
            border-radius: 30px; text-decoration: none; color: var(--text-color);
            transition: 0.3s;
        }

        /* 手機版適配：中層不縮放可能會導致圖片太寬，可加上 media query 微調 */
        @media screen and (max-width: 768px) {
            .layer-mid { background-size: 80% auto; } /* 手機版還是稍微縮小一點比較好，或維持 auto */
            .welcome-text { font-size: 2rem; }
            .names { padding-top: 100px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="layer-base"></div>
    <div class="layer-mid"></div>
    <div class="layer-top"></div>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:101;">
            <div class="seal" onclick="startApp()" style="width:80px; height:80px; background:var(--accent-gold); border-radius:50%; color:white; display:flex; justify-content:center; align-items:center; font-size:1.8rem; cursor:pointer;">囍</div>
        </div>
    </div>

    <div class="content-layer" id="mainContent">
        <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
        <div class="date-text">10 - 10 - 2026</div>
        <div class="names">凱翔 & 禹萱</div>
        <div id="dynamicTagline" class="tagline"></div>
        <a href="schedule.html" class="enter-button">開啟邀請函</a>
    </div>

    <script>
        const phrases = ["大家好～", "我們要結婚了！", "誠摯邀請大家參加我們的婚禮","婚禮有下午的教堂","還有晚上的晚宴" , "邀請大家參加，我們當天見"];
        let currentIndex = 0;

        function startApp() {
            // 1. 開啟紗簾
            document.body.classList.add('opened');
            
            // 2. 顯示內容
            setTimeout(() => {
                document.getElementById('mainContent').classList.add('visible');
                updateTagline();
            }, 1000);

            // 3. 移除紗簾層避免擋到按鈕
            setTimeout(() => {
                document.getElementById('curtainLayer').style.display = 'none';
            }, 3000);
        }

        function updateTagline() {
            const el = document.getElementById('dynamicTagline');
            el.classList.remove('visible');
            setTimeout(() => {
                el.innerText = phrases[currentIndex];
                el.classList.add('visible');
                if (currentIndex < phrases.length - 1) {
                    currentIndex++;
                    setTimeout(updateTagline, 4000);
                }
            }, 800);
        }
    </script>
</body>
</html>
