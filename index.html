<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chenyuluoyan-font@1.0.0/dist/chenyuluoyan.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Chenyuluoyan", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fdfdfd;
            overflow: hidden;
            font-family: var(--handwriting);
        }

        /* 背景底層內容 */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            
            /* --- 預設：電腦版背景 --- */
            background-image: url('main-background.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* 如果怕圖片被切到，這裡可以改為 contain */
        }

        /* --- 手機版背景切換 (螢幕寬度 600px 以下) --- */
        @media (max-width: 600px) {
            .content-layer {
                background-image: url('main-background-phone.png');
                /* 手機版通常建議用 cover 填滿螢幕，或是 contain 確保圖片完整 */
                background-size: cover; 
            }
            
            /* 手機版文字大小微調 */
            .welcome-text { font-size: 3rem; }
            .date-text { font-size: 1.2rem; margin-bottom: 40px; }
            .names { font-size: 2rem; }
            .enter-button { padding: 10px 40px; }
        }

        /* 紗簾容器與動畫 (保持不變) */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
        }

        .curtain {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .curtain.left { transform: translateX(0); border-right: 1px solid rgba(255,255,255,0.1); }
        .curtain.right { transform: translateX(0); }

        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }

        .seal-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: opacity 1.2s ease;
        }

        .opened .seal-wrapper { opacity: 0; }

        .seal {
            width: 80px;
            height: 80px;
            background: var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 文字與按鈕位置 */
        .welcome-text {
            font-size: 4rem;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .date-text {
            font-size: 1.6rem;
            letter-spacing: 4px;
            margin-bottom: 80px;
        }

        .names {
            font-size: 2.5rem;
            margin-top: 20px;
        }

        .tagline {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .enter-button {
            margin-top: 60px;
            padding: 12px 50px;
            background: white;
            border: 1px solid var(--accent-gold);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: auto;
            font-family: var(--handwriting);
        }

        .enter-button:hover {
            background: var(--accent-gold);
            color: white;
        }
    </style>
</head>
<body>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper">
            <div class="seal">囍</div>
        </div>
    </div>

    <div class="content-layer">
        <h1 class="welcome-text">歡迎來參加</h1>
        <div class="date-text">10 - 10 - 2026</div>
        <div class="names">凱翔與禹萱</div>
        <div class="tagline">我們要結婚了！</div>
        <a href="schedule.html" class="enter-button">開啟邀請函</a>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.body.classList.add('opened');
            }, 1000);
        };
    </script>

</body>
</html>
