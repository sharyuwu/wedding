<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fdfdfd; /* 確保底色與圖案背景一致 */
            overflow: hidden;
            font-family: var(--handwriting);
        }

        /* 背景層 */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            background-repeat: no-repeat;
            background-position: center center;
            
            /* --- 改為 contain：圖片不裁切 --- */
            background-image: url('main-background.png');
            background-size: contain; 
        }

        /* 手機版背景切換 */
        @media (max-width: 600px) {
            .content-layer {
                background-image: url('main-background-phone.png');
                /* --- 改為 contain：確保手機版圖片也完整 --- */
                background-size: contain; 
            }
            .welcome-text { font-size: 2.8rem; }
            .date-text { font-size: 1.2rem; margin-bottom: 30px; }
            .names { font-size: 1.8rem; }
            .enter-button { padding: 10px 35px; }
        }
