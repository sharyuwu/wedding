<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fdfdfd;
            overflow: hidden;
            font-family: var(--handwriting);
        }

        /* 背景底層內容 */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            background-repeat: no-repeat;
            background-position: center center;
            
            /* --- 圖片設定為 contain 不裁切 --- */
            background-size: contain; 
            background-image: url('main-background.png');
        }

        /* --- 手機版背景與樣式修正 (768px) --- */
        @media screen and (max-width: 768px) {
            .content-layer {
                background-image: url('main-background-phone.png') !important;
                background-size: contain !important;
                background-position: center center !important;
            }
            
            /* 手機版文字大小與位置微調 */
            .welcome-text { 
                font-size: 2.8rem !important; 
                margin-top: -60px !important; /* 手機版通常不需要往上移那麼多，可自行調整 */
            }
            .date-text { font-size: 1.2rem; margin-bottom: 40px; }
            .names { font-size: 1.8rem; }
            .enter-button { padding: 10px 40px; margin-top: 40px; }
        }

        /* 紗簾動畫 */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
        }
        .curtain {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .curtain.left { transform: translateX(0); border-right: 1px solid rgba(255,255,255,0.1); }
        .curtain.right { transform: translateX(0); }
        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }
        
        .seal-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: opacity 1.2s ease;
        }
        .opened .seal-wrapper { opacity: 0; }
        .seal {
            width: 80px;
            height: 80px;
            background: var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- 歡迎標題樣式 (同步你的最新設定) --- */
        .welcome-text {
            font-weight: 600;
            font-size: 3.8rem;
            color: var(--text-color);
            margin-top: -100px; /* 向上移動 100px */
            margin-bottom: 10px;
        }

        .date-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 80px;
        }

            font-weight: 600;
            font-size: 2.2rem;
            margin-top: 20px
