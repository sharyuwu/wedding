<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>凱翔 & 禹萱 Wedding</title>

    <link rel="preload" as="image" href="base-background-V1.png">

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --accent-gold: #a67c52;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* 防止捲動 */
            font-family: var(--handwriting);
            background-color: #fdfaf7;
        }

        /* --- 三層背景系統 --- */
        
        /* 1. 底層：滿版背景 */
        .layer-base {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('base-background-V1.png') center center / cover no-repeat;
            z-index: 1;
        }

        /* 2. 中層：不縮放，置中 (適合放置主視覺人像) */
        .layer-mid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('main-image-layer-mid.png') center center / auto no-repeat;
            z-index: 2;
            pointer-events: none;
        }

        /* 3. 頂層：滿版裝飾 (如邊框、光暈) */
        .layer-top {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('main-image-layer-top.png') center center / cover no-repeat;
            z-index: 3;
            pointer-events: none; /* 點擊穿透 */
        }

        /* --- 內容層 (文字與按鈕) --- */
        .content-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .content-layer.visible {
            opacity: 1;
        }

        /* --- 紗簾動畫層 --- */
        .curtain-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex;
        }

        .curtain {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .curtain.left { border-right: 1px solid rgba(255, 255, 255, 0.1); }

        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }

        /* --- 改進後的『囍』字互動區 --- */
        .seal-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: opacity 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer; /* 整區都是可點擊的手型 */
        }

        .opened .seal-wrapper { opacity: 0; pointer-events: none; }

        .seal {
            position: relative;
            width: 90px; height: 90px; /* 稍微放大一點點 */
            background: var(--accent-gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 2.0rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
            /* 1. 增加呼吸律動 */
            animation: seal-breathe 2.5s ease-in-out infinite;
        }

        /* 2. 增加動態擴散光圈 (Pulsing Aura) */
        .seal::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            opacity: 0;
            box-sizing: border-box;
            animation: seal-pulse 2.5s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }

        .seal:hover { transform: scale(1.05); } /* 稍微縮小 hover 幅度，交給動畫處理 */

        /* 3. 新增下方點擊提示文字 */
        .click-prompt {
            margin-top: 15px;
            color: var(--accent-gold);
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
            animation: click-prompt-fade 2.5s ease-in-out infinite;
        }

        /* --- 囍字動畫定義 --- */
        @keyframes seal-breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
            50% { transform: scale(1.04); box-shadow: 0 6px 20px rgba(166, 124, 82, 0.4); }
        }

        @keyframes seal-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes click-prompt-fade {
            0%, 100% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(2px); }
        }

        /* --- 文字樣式 --- */
        .welcome-text {
            font-size: 3.5rem;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .date-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .names {
            font-weight: 600;
            font-size: 2.2rem;
            margin-top: 250px; /* 根據中層圖片調整 */
        }

        .tagline {
            font-size: 1.4rem;
            margin-top: 20px;
            min-height: 1.6em;
            color: var(--text-color);
            opacity: 0;
            visibility: hidden;
            /* 淡出快 (0.4s)，減少殘影感 */
            transition: opacity 0.4s ease-in-out, visibility 0.4s;
        }

        .tagline.visible {
            opacity: 1;
            visibility: visible;
        }

        .enter-button {
            margin-top: 40px;
            padding: 12px 50px;
            background: white;
            border: 1px solid var(--accent-gold);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .enter-button:hover {
            background: var(--accent-gold);
            color: white;
        }

        /* --- 手機版適配 --- */
        @media screen and (max-width: 768px) {
            .layer-mid {
                background-size: contain; /* 手機版中層改為 contain 避免過大 */
            }
            .welcome-text { font-size: 2.2rem; }
            .names { font-size: 1.6rem; margin-top: 150px; }
            .tagline { font-size: 1.1rem; }
            .enter-button { padding: 10px 40px; }
            
            .seal { width: 80px; height: 80px; font-size: 1.8rem; } /* 手機版稍微縮小 */
            .click-prompt { font-size: 0.9rem; }
        }
    </style>
</head>

<body>

    <div class="layer-base"></div>
    <div class="layer-mid"></div>
    <div class="layer-top"></div>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper" onclick="startApp()">
            <div class="seal">囍</div>
            <div class="click-prompt">點擊開啟</div>
        </div>
    </div>

    <div class="content-layer" id="mainContent">
        <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
        <div class="date-text">10 - 10 - 2026</div>

        <div class="names">凱翔 & 禹萱</div>

        <div id="dynamicTagline" class="tagline"></div>

        <a href="schedule.html" class="enter-button">開啟邀請函</a>
    </div>

    <script>
        const phrases = [
            "大家好～",
            "我們要結婚了！",
            "誠摯邀請大家參加我們的婚禮",
            "我們當天見，感謝大家的祝福"
        ];

        let currentIndex = 0;
        const taglineEl = document.getElementById('dynamicTagline');

        // 初始化：點擊囍字啟動
        function startApp() {
            // 1. 拉開紗簾
            document.body.classList.add('opened');
            
            // 2. 顯示內容並開始輪播文字
            setTimeout(() => {
                document.getElementById('mainContent').classList.add('visible');
                updateTagline();
            }, 1000);

            // 3. 動畫完成後移除紗簾 DOM，節省效能並防止擋住點擊
            setTimeout(() => {
                const curtain = document.getElementById('curtainLayer');
                if (curtain) curtain.remove();
            }, 3000);
        }

        function updateTagline() {
            // A. 先淡出
            taglineEl.classList.remove('visible');

            // B. 確保淡出完全結束後 (500ms) 再換字
            setTimeout(() => {
                taglineEl.innerText = phrases[currentIndex];
                
                // C. 換字後微小延遲再淡入，徹底解決殘影閃爍
                setTimeout(() => {
                    taglineEl.classList.add('visible');
                }, 50);

                // D. 準備下一句
                if (currentIndex < phrases.length - 1) {
                    currentIndex++;
                    setTimeout(updateTagline, 4000); // 每一句停留時間
                }
            }, 500); 
        }
    </script>
</body>
</html>
