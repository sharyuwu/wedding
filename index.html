<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凱翔 & 禹萱 Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --text-color: #2c3e50; --accent-gold: #a67c52; --handwriting: "Klee One", "Noto Serif TC", serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: var(--handwriting); background-color: #fdfaf7; }

        /* 背景層 */
        .layer-base { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('base-background-V1.png') center center / cover no-repeat; z-index: 1; }
        .layer-mid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('main-image-layer-mid.png') center center / auto no-repeat; z-index: 2; pointer-events: none; }
        .layer-top { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('main-image-layer-top.png') center center / cover no-repeat; z-index: 3; pointer-events: none; }

        /* 3D 翻轉結構 */
        .content-layer { position: relative; z-index: 10; height: 100vh; opacity: 0; transition: opacity 1s; display: flex; justify-content: center; align-items: center; }
        .content-layer.visible { opacity: 1; }
        .card-scene { width: 100%; height: 100%; perspective: 2000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s; transform-style: preserve-3d; position: relative; }
        
        .is-flipped { transform: rotateY(-180deg); opacity: 0; }

        .card-front { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }

        /* 文字與按鈕 */
        .welcome-text { font-size: 3.5rem; color: var(--text-color); }
        .date-text { font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 20px; }
        .desktop-spacer { height: 300px; }
        .names { font-weight: 600; font-size: 2.2rem; }
        .tagline { font-size: 1.4rem; margin-top: 10px; min-height: 1.6em; opacity: 0; transition: 0.4s; }
        .tagline.visible { opacity: 1; }
        .enter-button { margin-top: 25px; padding: 12px 50px; background: white; border: 1px solid var(--accent-gold); color: var(--text-color); border-radius: 30px; font-size: 1.1rem; cursor: pointer; font-family: var(--handwriting); transition: 0.3s; }

        /* 紗簾遮罩樣式 */
        .curtain-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; }
        .curtain { flex: 1; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); transition: transform 2s ease-in-out; }
        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }
        .seal-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; cursor: pointer; text-align: center; transition: 0.8s; }
        .opened .seal-wrapper { opacity: 0; pointer-events: none; }
        .seal { width: 90px; height: 90px; background: var(--accent-gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; animation: seal-breathe 2.5s infinite; }

        @keyframes seal-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        @media screen and (max-width: 768px) {
            .layer-base { background-image: url('base-background-mobile.png'); }
            .layer-mid { background-image: url('main-image-layer-mid-mobile-V4.png'); background-size: auto; }
            .layer-top { background-image: url('main-image-layer-top-mobile-V4.png'); }
            .welcome-text { font-size: 1.8rem; }
            .desktop-spacer { height: 330px; }
        }
    </style>
</head>
<body>
    <div class="layer-base"></div>
    <div class="layer-mid"></div>
    <div class="layer-top"></div>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper" onclick="startApp()">
            <div class="seal">囍</div>
            <div style="margin-top:10px; color:var(--accent-gold)">點擊開啟</div>
        </div>
    </div>

    <div class="content-layer" id="mainContent">
        <div class="card-scene">
            <div class="card-inner" id="weddingCard">
                <div class="card-front">
                    <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
                    <div class="date-text">10 - 10 - 2026</div>
                    <div class="desktop-spacer"></div>
                    <div class="names">凱翔 & 禹萱</div>
                    <div id="dynamicTagline" class="tagline"></div>
                    <button class="enter-button" onclick="goToSchedule()">打開邀請函</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const phrases = ["大家好～", "我們要結婚了！", "誠摯邀請大家參加我們的婚禮"];
        let currentIndex = 0;

        // 【關鍵】頁面載入時檢查是否為第一次
        window.addEventListener('DOMContentLoaded', () => {
            const hasOpened = localStorage.getItem('wedding_opened');
            
            if (hasOpened === 'true') {
                // 如果已經開過，直接移除紗簾，不執行拉開動畫
                const curtainLayer = document.getElementById('curtainLayer');
                if (curtainLayer) curtainLayer.remove(); 
                
                // 直接顯示主內容
                document.getElementById('mainContent').classList.add('visible');
                updateTagline();
            }
        });

        // 第一次點擊「囍」字
        function startApp() {
            // 存入紀錄，下次進來就不會有紗簾
            localStorage.setItem('wedding_opened', 'true');
            
            document.body.classList.add('opened');
            setTimeout(() => {
                document.getElementById('mainContent').classList.add('visible');
                updateTagline();
            }, 1000);
            
            // 徹底移除 DOM 避免干擾
            setTimeout(() => {
                const curtain = document.getElementById('curtainLayer');
                if (curtain) curtain.remove();
            }, 3000);
        }

        function updateTagline() {
            const el = document.getElementById('dynamicTagline');
            if (!el) return;
            el.classList.remove('visible');
            setTimeout(() => {
                el.innerText = phrases[currentIndex];
                el.classList.add('visible');
                currentIndex = (currentIndex + 1) % phrases.length;
                setTimeout(updateTagline, 4000);
            }, 500);
        }

        function goToSchedule() {
            document.getElementById('weddingCard').classList.add('is-flipped');
            setTimeout(() => {
                window.location.href = "schedule.html";
            }, 700);
        }
    </script>
</body>
</html>
