<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>凱翔 & 禹萱 Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #2c3e50;
            --text-color-index: #2c3e50;
            --text-color-schedule: #5d4a44;
            --accent-gold: #a67c52;
            --light-gold: #e2c08d;
            --handwriting: "Klee One", "Noto Serif TC", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            font-family: var(--handwriting);
            scroll-behavior: smooth;
            background: none; 
            overflow: hidden; 
        }

        body.snap-mode {
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        /* --- 背景圖層系統 --- */
        .index-bg-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fdfaf7; z-index: -2;
            transition: opacity 1.5s ease;
        }
        .fixed-schedule-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ece5df;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            z-index: -1; opacity: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }
        body.show-bg .index-bg-base { opacity: 0; }
        body.show-bg .fixed-schedule-bg { opacity: 1; }

        .snap-section {
            width: 100%; height: 100vh; height: 100dvh;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; overflow: hidden;
            background: transparent !important;
        }

        /* --- Index 層級樣式 (圖片由 JS 載入) --- */
        #hero-section { z-index: 10; }
        .layer-base, .layer-mid, .layer-top {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center center; background-repeat: no-repeat;
            transition: opacity 1.5s ease-in-out;
        }
        .layer-base { z-index: 1; }
        .layer-mid { z-index: 2; pointer-events: none; }
        .layer-top { z-index: 3; pointer-events: none; }

        body.is-fading #hero-section .layer-base,
        body.is-fading #hero-section .layer-mid,
        body.is-fading #hero-section .layer-top,
        body.is-fading #hero-section .content-layer { opacity: 0; }

        .content-layer {
            position: relative; z-index: 10; height: 100dvh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            padding: 0 20px; opacity: 0; transition: opacity 1.2s ease-out;
        }
        .content-layer.visible { opacity: 1; }

        .welcome-text { font-size: 3.5rem; color: var(--text-color-index); margin-bottom: 5px; }
        .date-text-index { font-size: 1.5rem; letter-spacing: 5px; color: var(--text-color-index); }
        .spacer-gap { width: 100%; height: 40vh; } 
        .names-index { font-weight: 600; font-size: 2.2rem; color: var(--text-color-index); }
        .tagline { font-size: 1.4rem; margin-top: 10px; min-height: 1.6em; color: var(--text-color-index); opacity: 0; transition: 0.4s; }
        .tagline.visible { opacity: 1; }

        .enter-button {
            margin-top: 20px; padding: 12px 50px; background: white;
            border: 1px solid var(--accent-gold); color: var(--text-color);
            text-decoration: none; border-radius: 30px; font-size: 1.1rem;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer; display: inline-block;
        }

        /* --- 窗簾與囍字 --- */
        .curtain-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; }
        .curtain { 
            flex: 1; height: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); 
            transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); 
            transition-delay: 0.4s; 
        }
        .opened .curtain.left { transform: translateX(-100%); }
        .opened .curtain.right { transform: translateX(100%); }

        .seal-wrapper { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 101; cursor: pointer; text-align: center; 
            transition: opacity 0.3s ease-out; 
        }
        .opened .seal-wrapper { opacity: 0; pointer-events: none; }
        .seal { width: 90px; height: 90px; background: var(--accent-gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: seal-breathe 2.5s infinite; }
        @keyframes seal-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* --- 音樂按鈕樣式 --- */
        .music-toggle {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            width: 45px; height: 45px; background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--accent-gold); border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 0; transition: opacity 0.5s;
        }
        body.opened .music-toggle { opacity: 1; }
        .music-icon { width: 24px; height: 24px; fill: var(--accent-gold); }
        .rotating { animation: music-rotate 3s linear infinite; }
        @keyframes music-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- Schedule 排版與細節 (保持不變) --- */
        #schedule-section { background: transparent !important; opacity: 0; transition: opacity 1.5s ease-in-out; color: var(--text-color-schedule); overflow-y: auto; }
        body.show-schedule #schedule-section { opacity: 1; }
        .page-wrapper { width: 100%; min-height: 100vh; display: flex; justify-content: center; position: relative; z-index: 1; }
        .card-inner, .card-face { width: 100%; display: flex; flex-direction: column; align-items: center; background: transparent !important; }
        .hero-title { font-size: 2.5rem; letter-spacing: 6px; margin-top: 60px; text-shadow: 0 0 10px white; }
        .hero-date { font-size: 2rem; color: var(--accent-gold); margin-bottom: 40px; }
        .schedule-content-wrapper { width: 100%; max-width: 1100px; background: rgba(255, 255, 255, 0.5); border-radius: 40px; padding: 60px 40px; backdrop-filter: blur(5px); margin: 20px auto; }
        .schedule-grid { display: grid; grid-template-columns: 1fr 100px 1fr; width: 100%; }
        .schedule-column { display: flex; flex-direction: column; gap: 60px; text-align: center; }
        .event-item { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 40px; }
        .divider-container { display: flex; flex-direction: column; align-items: center; }
        .divider-line { width: 1px; flex-grow: 1; background: var(--light-gold); }
        .divider-ring-img { width: 80px; margin: 25px 0; }

        @media (max-width: 768px) {
            .welcome-text { font-size: 1.8rem; }
            .spacer-gap { height: 50dvh; }
            .schedule-grid { grid-template-columns: 1fr; }
            .divider-container { flex-direction: row; padding: 40px 0; justify-content: center; align-items: center; width: 100%; }
            .divider-line { width: 60px; height: 1px; flex-grow: 0; }
            .divider-ring-img { width: 50px; margin: 0 15px; }
            .event-item { gap: 20px; }
        }
    </style>
</head>

<body>

    <div class="index-bg-base"></div>
    <div class="fixed-schedule-bg" id="fixedScheduleBg"></div>

    <audio id="bgMusic" src="music/backgroud_music.mp3" preload="none" loop></audio>
    <div class="music-toggle" id="musicToggle" onclick="toggleMusic()">
        <svg class="music-icon" id="musicIcon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </div>

    <div class="curtain-wrapper" id="curtainLayer">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="seal-wrapper" onclick="startApp()">
            <div class="seal">囍</div>
            <div style="margin-top: 15px; color: var(--accent-gold);">點擊開啟</div>
        </div>
    </div>

    <section class="snap-section" id="hero-section">
        <div class="layer-base" id="baseLayer"></div>
        <div class="layer-mid" id="midLayer"></div>
        <div class="layer-top" id="topLayer"></div>
        
        <div class="content-layer" id="mainContent">
            <div class="text-top-group">
                <h1 class="welcome-text">歡迎參加我們的婚禮</h1>
                <div class="date-text-index">10 - 10 - 2026</div>
            </div>
            <div class="spacer-gap"></div>
            <div class="text-bottom-group">
                <div class="names-index">凱翔 & 禹萱</div>
                <div id="dynamicTagline" class="tagline"></div>
                <a href="javascript:void(0)" class="enter-button" onclick="goToSchedule()">打開邀請函</a>
            </div>
        </div>
    </section>

    <section class="snap-section" id="schedule-section">
        <div class="page-wrapper">
            <div class="card-inner">
                <div class="card-face">
                    <h1 class="hero-title">凱翔與禹萱的婚禮</h1>
                    <p class="hero-date">10.10.2026</p>
                    
                    <div class="rsvp-container"><button class="rsvp-button" onclick="window.open('...')">回覆出席</button></div>

                    <div class="schedule-content-wrapper">
                        <h2 class="schedule-main-title">我們特別的日子</h2>
                        <div class="schedule-grid">
                            <div class="schedule-column">
                                <div class="event-item">
                                    <div style="display:flex; flex-direction:column; align-items:center;">
                                        <p style="font-weight:600; font-size:1.5rem;">13:00</p><p>賓客入場</p>
                                    </div>
                                    <img src="schedule/icon_church.png" style="width:100px;">
                                </div>
                            </div>
                            <div class="divider-container">
                                <div class="divider-line"></div><img src="schedule/icon_ring.png" class="divider-ring-img"><div class="divider-line"></div>
                            </div>
                            <div class="schedule-column">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const phrases = ["大家好～", "我們要結婚了！", "誠摯邀請大家參加我們的婚禮", "我們當天見，感謝大家的祝福"];
        let currentIndex = 0;
        const taglineEl = document.getElementById('dynamicTagline');
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const musicIcon = document.getElementById('musicIcon');

        // --- 瀑布流載入圖片 ---
        function preloadImage(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = url;
                img.onload = () => resolve(url);
            });
        }

        async function initWaterfallLoading() {
            const isMobile = window.innerWidth <= 768;
            const suffix = isMobile ? '_mobile' : '';
            // 順序：Top -> Mid -> Base -> Schedule
            const top = await preloadImage(`main-image-layer-top${suffix}.png`);
            document.getElementById('topLayer').style.backgroundImage = `url('${top}')`;
            const mid = await preloadImage(`main-image-layer-mid${suffix}.png`);
            document.getElementById('midLayer').style.backgroundImage = `url('${mid}')`;
            const base = await preloadImage(`base-background-V1${suffix}.png`);
            document.getElementById('baseLayer').style.backgroundImage = `url('${base}')`;
            const sched = await preloadImage(isMobile ? 'schedule/background_mobile.jpg' : 'schedule/background.jpg');
            document.getElementById('fixedScheduleBg').style.backgroundImage = `url('${sched}')`;
        }

        window.addEventListener('load', initWaterfallLoading);

        // --- 核心互動：點擊「囍」字 ---
        function startApp() {
            // 1. 同步處理音樂
            if (bgMusic) {
                bgMusic.play().then(() => {
                    musicToggle.classList.add('rotating');
                }).catch(e => console.log("音樂播放被阻擋", e));
            }

            // 2. 觸發視覺動畫
            document.body.classList.add('opened');
            setTimeout(() => { document.body.classList.add('snap-mode'); }, 50);
            setTimeout(showIndex, 1300);
            setTimeout(() => {
                const curtain = document.getElementById('curtainLayer');
                if (curtain) curtain.remove();
            }, 3500);
        }

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play();
                musicToggle.classList.add('rotating');
            } else {
                bgMusic.pause();
                musicToggle.classList.remove('rotating');
            }
        }

        function showIndex() {
            const mainContent = document.getElementById('mainContent');
            if (mainContent) {
                mainContent.classList.add('visible');
                updateTagline();
            }
        }

        function updateTagline() {
            if (!taglineEl) return;
            taglineEl.classList.remove('visible');
            setTimeout(() => {
                taglineEl.innerText = phrases[currentIndex];
                setTimeout(() => taglineEl.classList.add('visible'), 50);
                if (currentIndex < phrases.length - 1) {
                    currentIndex++;
                    setTimeout(updateTagline, 4000);
                }
            }, 500);
        }

        function goToSchedule() {
            document.body.classList.add('is-fading');
            document.body.classList.add('show-bg');
            document.body.classList.add('show-schedule');
            document.getElementById('schedule-section').scrollIntoView({ behavior: 'smooth' });
        }

        window.addEventListener('DOMContentLoaded', () => {
            if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }
            window.scrollTo(0, 0);

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        document.body.classList.add('show-bg', 'show-schedule', 'is-fading');
                    } else if (window.scrollY < window.innerHeight / 2) {
                        document.body.classList.remove('show-bg', 'show-schedule', 'is-fading');
                    }
                });
            }, { threshold: 0.3 });
            observer.observe(document.getElementById('schedule-section'));
        });
    </script>
</body>
</html>
